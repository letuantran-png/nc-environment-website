<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="atBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E3A5F" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#4A6741" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="leafG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A6741"/>
      <stop offset="100%" stop-color="#2d3d28"/>
    </linearGradient>
  </defs>

  <rect width="500" height="500" fill="url(#atBg)" rx="20"/>

  <!-- Decorative circles -->
  <circle cx="250" cy="250" r="200" fill="none" stroke="#1E3A5F" stroke-width="1" opacity="0.06"/>
  <circle cx="250" cy="250" r="160" fill="none" stroke="#4A6741" stroke-width="1" opacity="0.08"/>
  <circle cx="250" cy="250" r="120" fill="none" stroke="#C47D5A" stroke-width="1" opacity="0.06"/>

  <!-- Central shield/logo -->
  <g transform="translate(200, 150)">
    <path d="M50 0 L100 25 L100 70 Q100 120 50 140 Q0 120 0 70 L0 25Z" fill="#1E3A5F" opacity="0.1"/>
    <path d="M50 10 L90 30 L90 68 Q90 110 50 128 Q10 110 10 68 L10 30Z" fill="#FAF7F2" stroke="#1E3A5F" stroke-width="2"/>
    <!-- Leaf inside shield -->
    <path d="M50 40 Q30 60 35 90 Q50 70 65 85 Q70 55 50 40Z" fill="url(#leafG)" opacity="0.6"/>
    <line x1="50" y1="42" x2="48" y2="80" stroke="#4A6741" stroke-width="1.5" opacity="0.4"/>
    <!-- Checkmark -->
    <circle cx="50" cy="100" r="12" fill="#C47D5A" opacity="0.2"/>
    <path d="M44 100 L48 104 L56 96" stroke="#C47D5A" stroke-width="2.5" fill="none"/>
  </g>

  <!-- People silhouettes around -->
  <!-- Person 1 - left -->
  <g transform="translate(70, 200)">
    <circle cx="25" cy="15" r="15" fill="#1E3A5F" opacity="0.15"/>
    <path d="M5 55 Q5 35 25 35 Q45 35 45 55" fill="#1E3A5F" opacity="0.12"/>
  </g>

  <!-- Person 2 - right -->
  <g transform="translate(380, 200)">
    <circle cx="25" cy="15" r="15" fill="#4A6741" opacity="0.15"/>
    <path d="M5 55 Q5 35 25 35 Q45 35 45 55" fill="#4A6741" opacity="0.12"/>
  </g>

  <!-- Person 3 - bottom left -->
  <g transform="translate(120, 340)">
    <circle cx="20" cy="12" r="12" fill="#C47D5A" opacity="0.15"/>
    <path d="M4 45 Q4 28 20 28 Q36 28 36 45" fill="#C47D5A" opacity="0.12"/>
  </g>

  <!-- Person 4 - bottom right -->
  <g transform="translate(340, 340)">
    <circle cx="20" cy="12" r="12" fill="#8B7355" opacity="0.15"/>
    <path d="M4 45 Q4 28 20 28 Q36 28 36 45" fill="#8B7355" opacity="0.12"/>
  </g>

  <!-- Connection lines -->
  <line x1="110" y1="230" x2="200" y2="220" stroke="#1E3A5F" stroke-width="1" stroke-dasharray="4,4" opacity="0.15"/>
  <line x1="390" y1="230" x2="300" y2="220" stroke="#4A6741" stroke-width="1" stroke-dasharray="4,4" opacity="0.15"/>
  <line x1="150" y1="360" x2="220" y2="290" stroke="#C47D5A" stroke-width="1" stroke-dasharray="4,4" opacity="0.15"/>
  <line x1="370" y1="360" x2="280" y2="290" stroke="#8B7355" stroke-width="1" stroke-dasharray="4,4" opacity="0.15"/>

  <!-- Values -->
  <g transform="translate(50, 100)">
    <rect width="90" height="30" rx="15" fill="#1E3A5F" opacity="0.08"/>
    <text x="45" y="20" text-anchor="middle" font-size="11" fill="#1E3A5F" font-family="Arial, Helvetica, sans-serif">Chuyên nghiệp</text>
  </g>

  <g transform="translate(360, 100)">
    <rect width="90" height="30" rx="15" fill="#4A6741" opacity="0.08"/>
    <text x="45" y="20" text-anchor="middle" font-size="11" fill="#4A6741" font-family="Arial, Helvetica, sans-serif">Bền vững</text>
  </g>

  <g transform="translate(30, 310)">
    <rect width="70" height="30" rx="15" fill="#C47D5A" opacity="0.08"/>
    <text x="35" y="20" text-anchor="middle" font-size="11" fill="#C47D5A" font-family="Arial, Helvetica, sans-serif">Tận tâm</text>
  </g>

  <g transform="translate(400, 310)">
    <rect width="70" height="30" rx="15" fill="#8B7355" opacity="0.08"/>
    <text x="35" y="20" text-anchor="middle" font-size="11" fill="#8B7355" font-family="Arial, Helvetica, sans-serif">Uy tín</text>
  </g>

  <!-- Year badge -->
  <g transform="translate(210, 410)">
    <rect width="80" height="40" rx="20" fill="#C47D5A" opacity="0.12"/>
    <text x="40" y="20" text-anchor="middle" font-size="10" fill="#C47D5A" font-family="Arial, Helvetica, sans-serif">Since</text>
    <text x="40" y="34" text-anchor="middle" font-size="14" fill="#1E3A5F" font-weight="bold" font-family="Arial, sans-serif">2026</text>
  </g>

  <!-- Bottom text -->
  <text x="250" y="480" text-anchor="middle" font-size="13" fill="#1E3A5F" font-weight="bold" font-family="Arial, sans-serif">NC Environment</text>
</svg>