<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="npBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B7355"/>
      <stop offset="100%" stop-color="#C47D5A"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#npBg)" rx="12"/>
  <!-- Gavel -->
  <g transform="translate(200, 60)">
    <!-- Handle -->
    <rect x="90" y="80" width="120" height="16" rx="4" fill="#FAF7F2" opacity="0.3" transform="rotate(-45, 150, 88)"/>
    <!-- Head -->
    <rect x="60" y="50" width="60" height="35" rx="6" fill="#FAF7F2" opacity="0.8"/>
    <rect x="65" y="55" width="50" height="25" rx="4" fill="#1E3A5F" opacity="0.2"/>
    <!-- Strike plate -->
    <ellipse cx="90" cy="130" rx="70" ry="12" fill="#FAF7F2" opacity="0.15"/>
    <rect x="30" y="120" width="120" height="15" rx="4" fill="#FAF7F2" opacity="0.25"/>
  </g>
  <!-- Warning signs -->
  <g transform="translate(380, 80)">
    <polygon points="50,0 100,85 0,85" fill="none" stroke="#FAF7F2" stroke-width="3" opacity="0.4"/>
    <text x="50" y="65" text-anchor="middle" font-size="35" fill="#FAF7F2" font-weight="bold" font-family="Arial, Helvetica, sans-serif" opacity="0.5">!</text>
  </g>
  <!-- Penalty amounts -->
  <g transform="translate(80, 210)">
    <rect width="180" height="35" rx="6" fill="#FAF7F2" opacity="0.15"/>
    <text x="15" y="23" font-size="12" fill="#FAF7F2" font-family="Arial, Helvetica, sans-serif">Nước thải: </text>
    <text x="100" y="23" font-size="13" fill="#FAF7F2" font-weight="bold" font-family="Arial, Helvetica, sans-serif">50 - 500 triệu</text>
  </g>
  <g transform="translate(80, 255)">
    <rect width="180" height="35" rx="6" fill="#FAF7F2" opacity="0.12"/>
    <text x="15" y="23" font-size="12" fill="#FAF7F2" font-family="Arial, Helvetica, sans-serif">Khí thải: </text>
    <text x="90" y="23" font-size="13" fill="#FAF7F2" font-weight="bold" font-family="Arial, Helvetica, sans-serif">30 - 300 triệu</text>
  </g>
  <g transform="translate(300, 210)">
    <rect width="200" height="35" rx="6" fill="#FAF7F2" opacity="0.15"/>
    <text x="15" y="23" font-size="12" fill="#FAF7F2" font-family="Arial, Helvetica, sans-serif">CTNH: </text>
    <text x="70" y="23" font-size="13" fill="#FAF7F2" font-weight="bold" font-family="Arial, Helvetica, sans-serif">50 triệu - 1 tỷ</text>
  </g>
  <g transform="translate(300, 255)">
    <rect width="200" height="35" rx="6" fill="#FAF7F2" opacity="0.12"/>
    <text x="15" y="23" font-size="12" fill="#FAF7F2" font-family="Arial, Helvetica, sans-serif">ĐTM/GPMT: </text>
    <text x="100" y="23" font-size="13" fill="#FAF7F2" font-weight="bold" font-family="Arial, Helvetica, sans-serif">30 - 500 triệu</text>
  </g>
  <text x="300" y="340" text-anchor="middle" font-size="18" fill="#FAF7F2" font-weight="bold" font-family="Arial, sans-serif">Mức xử phạt Vi phạm Môi trường</text>
  <text x="300" y="365" text-anchor="middle" font-size="12" fill="#FAF7F2" opacity="0.6" font-family="Arial, Helvetica, sans-serif">Nghị định 45/2022/NĐ-CP - Cập nhật mới nhất</text>
</svg>