<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="ngBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#2D4A6F"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#ngBg)" rx="12"/>

  <!-- Document stack -->
  <g transform="translate(150, 60)">
    <!-- Back doc -->
    <rect x="20" y="20" width="200" height="260" rx="8" fill="#FAF7F2" opacity="0.15"/>
    <!-- Middle doc -->
    <rect x="10" y="10" width="200" height="260" rx="8" fill="#FAF7F2" opacity="0.3"/>
    <!-- Front doc -->
    <rect x="0" y="0" width="200" height="260" rx="8" fill="#FAF7F2" opacity="0.95"/>

    <!-- Doc content -->
    <rect x="20" y="20" width="100" height="12" rx="3" fill="#1E3A5F" opacity="0.25"/>
    <rect x="20" y="40" width="160" height="6" rx="2" fill="#1E3A5F" opacity="0.1"/>
    <rect x="20" y="52" width="140" height="6" rx="2" fill="#1E3A5F" opacity="0.1"/>
    <rect x="20" y="64" width="155" height="6" rx="2" fill="#1E3A5F" opacity="0.1"/>
    <rect x="20" y="76" width="120" height="6" rx="2" fill="#1E3A5F" opacity="0.1"/>

    <rect x="20" y="96" width="80" height="10" rx="3" fill="#4A6741" opacity="0.2"/>
    <rect x="20" y="114" width="160" height="6" rx="2" fill="#1E3A5F" opacity="0.08"/>
    <rect x="20" y="126" width="150" height="6" rx="2" fill="#1E3A5F" opacity="0.08"/>
    <rect x="20" y="138" width="145" height="6" rx="2" fill="#1E3A5F" opacity="0.08"/>

    <rect x="20" y="160" width="90" height="10" rx="3" fill="#C47D5A" opacity="0.2"/>
    <rect x="20" y="178" width="160" height="6" rx="2" fill="#1E3A5F" opacity="0.08"/>
    <rect x="20" y="190" width="130" height="6" rx="2" fill="#1E3A5F" opacity="0.08"/>

    <!-- Stamp/Seal -->
    <circle cx="150" cy="230" r="20" fill="none" stroke="#C47D5A" stroke-width="2.5" opacity="0.5"/>
    <circle cx="150" cy="230" r="14" fill="none" stroke="#C47D5A" stroke-width="1" opacity="0.3"/>
    <text x="150" y="234" text-anchor="middle" font-size="10" fill="#C47D5A" font-weight="bold" font-family="Arial, Helvetica, sans-serif">GPMT</text>

    <!-- Checkmark badge -->
    <circle cx="40" cy="230" r="15" fill="#4A6741" opacity="0.8"/>
    <path d="M33 230 L38 235 L48 225" stroke="#FAF7F2" stroke-width="2.5" fill="none"/>
  </g>

  <!-- Decorative elements -->
  <g transform="translate(400, 80)">
    <path d="M0 60 Q30 0 70 20 Q40 35 30 65Z" fill="#4A6741" opacity="0.2"/>
    <path d="M10 80 Q45 30 80 40 Q50 50 40 80Z" fill="#4A6741" opacity="0.15"/>
  </g>

  <!-- Arrow pointing to doc -->
  <g transform="translate(420, 180)">
    <rect width="120" height="40" rx="20" fill="#C47D5A" opacity="0.3"/>
    <text x="60" y="25" text-anchor="middle" font-size="12" fill="#FAF7F2" font-family="Arial, Helvetica, sans-serif">Cập nhật 2026</text>
  </g>

  <!-- Bottom label -->
  <text x="300" y="360" text-anchor="middle" font-size="18" fill="#FAF7F2" font-weight="bold" font-family="Arial, sans-serif">Giấy phép Môi trường</text>
  <text x="300" y="385" text-anchor="middle" font-size="12" fill="#FAF7F2" opacity="0.6" font-family="Arial, Helvetica, sans-serif">Hướng dẫn thủ tục mới nhất năm 2026</text>
</svg>