<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2D4A6F" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1E3A5F" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4A6741"/>
      <stop offset="100%" stop-color="#2ECC40"/>
    </linearGradient>
    <linearGradient id="waterGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00B4D8"/>
      <stop offset="100%" stop-color="#1E3A5F"/>
    </linearGradient>
    <linearGradient id="copperGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C47D5A"/>
      <stop offset="100%" stop-color="#D4A574"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="300" cy="250" r="220" fill="url(#skyGrad)" opacity="0.4"/>
  <circle cx="300" cy="250" r="170" fill="none" stroke="#C47D5A" stroke-width="1" stroke-dasharray="8 6" opacity="0.4"/>

  <!-- Earth/Globe -->
  <circle cx="300" cy="240" r="110" fill="#1E3A5F" opacity="0.15"/>
  <circle cx="300" cy="240" r="105" fill="none" stroke="#2D4A6F" stroke-width="1.5" opacity="0.3"/>
  <!-- Continents abstracted -->
  <path d="M250 200 Q270 180 310 185 Q340 190 350 210 Q345 225 330 220 Q310 215 290 225 Q265 220 250 200Z" fill="#4A6741" opacity="0.5"/>
  <path d="M270 250 Q285 240 300 245 Q320 250 315 270 Q300 280 280 275 Q265 265 270 250Z" fill="#4A6741" opacity="0.4"/>
  <path d="M330 240 Q345 235 355 250 Q350 265 340 260 Q330 255 330 240Z" fill="#4A6741" opacity="0.35"/>

  <!-- Factory with green chimney (clean industry) -->
  <rect x="120" y="280" width="70" height="80" rx="4" fill="#2D4A6F" opacity="0.7"/>
  <rect x="130" y="260" width="15" height="30" rx="2" fill="#2D4A6F" opacity="0.8"/>
  <!-- Clean smoke = leaves -->
  <circle cx="137" cy="245" r="8" fill="#4A6741" opacity="0.6"/>
  <circle cx="130" cy="232" r="6" fill="#4A6741" opacity="0.5"/>
  <circle cx="142" cy="228" r="5" fill="#4A6741" opacity="0.4"/>
  <!-- Factory windows -->
  <rect x="132" y="295" width="18" height="14" rx="2" fill="#C47D5A" opacity="0.5"/>
  <rect x="158" y="295" width="18" height="14" rx="2" fill="#C47D5A" opacity="0.5"/>
  <rect x="132" y="320" width="18" height="14" rx="2" fill="#C47D5A" opacity="0.4"/>
  <rect x="158" y="320" width="18" height="14" rx="2" fill="#C47D5A" opacity="0.4"/>

  <!-- Water treatment facility -->
  <ellipse cx="440" cy="330" rx="55" ry="25" fill="url(#waterGrad)" opacity="0.3"/>
  <ellipse cx="440" cy="330" rx="45" ry="18" fill="none" stroke="#00B4D8" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="440" cy="330" rx="30" ry="10" fill="#00B4D8" opacity="0.2"/>
  <!-- Water drops -->
  <path d="M420 290 Q425 280 430 290 Q425 298 420 290Z" fill="#00B4D8" opacity="0.6"/>
  <path d="M445 285 Q450 275 455 285 Q450 293 445 285Z" fill="#00B4D8" opacity="0.5"/>
  <path d="M460 295 Q465 287 470 295 Q465 302 460 295Z" fill="#00B4D8" opacity="0.4"/>

  <!-- Large tree (center-right) -->
  <rect x="370" y="220" width="12" height="60" rx="3" fill="#8B7355"/>
  <!-- Tree crown -->
  <circle cx="376" cy="195" r="35" fill="#4A6741" opacity="0.7"/>
  <circle cx="360" cy="210" r="25" fill="#4A6741" opacity="0.6"/>
  <circle cx="395" cy="208" r="28" fill="#4A6741" opacity="0.65"/>
  <circle cx="376" cy="180" r="20" fill="#2ECC40" opacity="0.4"/>

  <!-- Small tree (left) -->
  <rect x="210" y="300" width="8" height="35" rx="2" fill="#8B7355"/>
  <circle cx="214" cy="285" r="22" fill="#4A6741" opacity="0.6"/>
  <circle cx="205" cy="295" r="16" fill="#4A6741" opacity="0.5"/>
  <circle cx="225" cy="292" r="18" fill="#4A6741" opacity="0.55"/>

  <!-- Document/Certificate icon -->
  <g transform="translate(480, 150)">
    <rect x="0" y="0" width="50" height="65" rx="6" fill="white" opacity="0.9" stroke="#C47D5A" stroke-width="1.5"/>
    <rect x="10" y="12" width="30" height="3" rx="1" fill="#1E3A5F" opacity="0.4"/>
    <rect x="10" y="20" width="25" height="3" rx="1" fill="#1E3A5F" opacity="0.3"/>
    <rect x="10" y="28" width="30" height="3" rx="1" fill="#1E3A5F" opacity="0.4"/>
    <circle cx="25" cy="48" r="10" fill="none" stroke="#C47D5A" stroke-width="1.5"/>
    <path d="M21 48 L24 51 L30 44" fill="none" stroke="#4A6741" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Circular arrows (sustainability) -->
  <g transform="translate(300, 240)" opacity="0.35">
    <path d="M-60 0 A60 60 0 0 1 0 -60" fill="none" stroke="#C47D5A" stroke-width="3" stroke-linecap="round"/>
    <path d="M0 -60 A60 60 0 0 1 60 0" fill="none" stroke="#4A6741" stroke-width="3" stroke-linecap="round"/>
    <path d="M60 0 A60 60 0 0 1 0 60" fill="none" stroke="#00B4D8" stroke-width="3" stroke-linecap="round"/>
    <path d="M0 60 A60 60 0 0 1 -60 0" fill="none" stroke="#1E3A5F" stroke-width="3" stroke-linecap="round"/>
    <!-- Arrowheads -->
    <polygon points="-5,-60 5,-60 0,-52" fill="#4A6741" opacity="0.8"/>
    <polygon points="60,-5 60,5 52,0" fill="#00B4D8" opacity="0.8"/>
    <polygon points="-5,60 5,60 0,52" fill="#1E3A5F" opacity="0.8"/>
    <polygon points="-60,-5 -60,5 -52,0" fill="#C47D5A" opacity="0.8"/>
  </g>

  <!-- Leaf decorations -->
  <g opacity="0.5">
    <path d="M100 170 Q115 150 130 170 Q115 175 100 170Z" fill="#4A6741"/>
    <line x1="100" y1="170" x2="130" y2="170" stroke="#2ECC40" stroke-width="0.5"/>
  </g>
  <g opacity="0.4" transform="rotate(30, 500, 400)">
    <path d="M490 400 Q505 380 520 400 Q505 405 490 400Z" fill="#4A6741"/>
  </g>

  <!-- Ground line -->
  <path d="M50 360 Q150 355 250 362 Q350 358 450 365 Q520 360 570 362" fill="none" stroke="#4A6741" stroke-width="2" opacity="0.3"/>

  <!-- Small decorative dots -->
  <circle cx="160" cy="170" r="3" fill="#C47D5A" opacity="0.4"/>
  <circle cx="480" cy="280" r="4" fill="#C47D5A" opacity="0.3"/>
  <circle cx="240" cy="150" r="2.5" fill="#00B4D8" opacity="0.4"/>
  <circle cx="520" cy="350" r="3" fill="#4A6741" opacity="0.3"/>
</svg>
