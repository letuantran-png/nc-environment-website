<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="soBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E3A5F" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#4A6741" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="400" fill="url(#soBg)" rx="12"/>

  <!-- Service 1: ĐTM -->
  <g transform="translate(30, 30)">
    <rect width="160" height="160" rx="16" fill="#1E3A5F" opacity="0.08"/>
    <rect x="20" y="20" width="120" height="120" rx="12" fill="#FAF7F2" stroke="#1E3A5F" stroke-width="2"/>
    <rect x="40" y="40" width="80" height="10" rx="3" fill="#1E3A5F" opacity="0.2"/>
    <rect x="40" y="55" width="60" height="6" rx="2" fill="#1E3A5F" opacity="0.12"/>
    <rect x="40" y="65" width="70" height="6" rx="2" fill="#1E3A5F" opacity="0.12"/>
    <rect x="40" y="75" width="50" height="6" rx="2" fill="#1E3A5F" opacity="0.12"/>
    <circle cx="70" cy="105" r="15" fill="#C47D5A" opacity="0.2"/>
    <text x="70" y="109" text-anchor="middle" font-size="10" fill="#C47D5A" font-weight="bold" font-family="Arial, Helvetica, sans-serif">ĐTM</text>
    <text x="80" y="215" text-anchor="middle" font-size="13" fill="#1E3A5F" font-weight="bold" font-family="Arial, Helvetica, sans-serif">Đánh giá tác</text>
    <text x="80" y="232" text-anchor="middle" font-size="13" fill="#1E3A5F" font-weight="bold" font-family="Arial, Helvetica, sans-serif">động MT</text>
  </g>

  <!-- Arrow -->
  <path d="M200 110 L225 110" stroke="#C47D5A" stroke-width="2" stroke-dasharray="4,4" opacity="0.5"/>

  <!-- Service 2: GPMT -->
  <g transform="translate(230, 30)">
    <rect width="160" height="160" rx="16" fill="#4A6741" opacity="0.08"/>
    <rect x="20" y="15" width="120" height="130" rx="12" fill="#FAF7F2" stroke="#4A6741" stroke-width="2"/>
    <circle cx="80" cy="55" r="25" fill="#4A6741" opacity="0.15"/>
    <path d="M70 55 L77 62 L92 47" stroke="#4A6741" stroke-width="3" fill="none"/>
    <rect x="40" y="90" width="80" height="8" rx="3" fill="#4A6741" opacity="0.2"/>
    <rect x="50" y="105" width="60" height="6" rx="2" fill="#4A6741" opacity="0.12"/>
    <text x="80" y="215" text-anchor="middle" font-size="13" fill="#1E3A5F" font-weight="bold" font-family="Arial, Helvetica, sans-serif">Giấy phép</text>
    <text x="80" y="232" text-anchor="middle" font-size="13" fill="#1E3A5F" font-weight="bold" font-family="Arial, Helvetica, sans-serif">môi trường</text>
  </g>

  <path d="M400 110 L425 110" stroke="#C47D5A" stroke-width="2" stroke-dasharray="4,4" opacity="0.5"/>

  <!-- Service 3: Quan trắc -->
  <g transform="translate(430, 30)">
    <rect width="160" height="160" rx="16" fill="#C47D5A" opacity="0.08"/>
    <rect x="20" y="20" width="120" height="120" rx="12" fill="#FAF7F2" stroke="#C47D5A" stroke-width="2"/>
    <!-- Chart -->
    <rect x="40" y="95" width="15" height="30" rx="2" fill="#1E3A5F" opacity="0.3"/>
    <rect x="60" y="75" width="15" height="50" rx="2" fill="#4A6741" opacity="0.4"/>
    <rect x="80" y="85" width="15" height="40" rx="2" fill="#C47D5A" opacity="0.4"/>
    <rect x="100" y="65" width="15" height="60" rx="2" fill="#1E3A5F" opacity="0.3"/>
    <!-- Line -->
    <polyline points="47,85 67,65 87,75 107,55" stroke="#C47D5A" stroke-width="2" fill="none"/>
    <circle cx="47" cy="85" r="3" fill="#C47D5A"/>
    <circle cx="67" cy="65" r="3" fill="#C47D5A"/>
    <circle cx="87" cy="75" r="3" fill="#C47D5A"/>
    <circle cx="107" cy="55" r="3" fill="#C47D5A"/>
    <text x="80" y="215" text-anchor="middle" font-size="13" fill="#1E3A5F" font-weight="bold" font-family="Arial, Helvetica, sans-serif">Quan trắc</text>
    <text x="80" y="232" text-anchor="middle" font-size="13" fill="#1E3A5F" font-weight="bold" font-family="Arial, Helvetica, sans-serif">môi trường</text>
  </g>

  <path d="M600 110 L625 110" stroke="#C47D5A" stroke-width="2" stroke-dasharray="4,4" opacity="0.5"/>

  <!-- Service 4: XLNT -->
  <g transform="translate(630, 30)">
    <rect width="160" height="160" rx="16" fill="#00B4D8" opacity="0.08"/>
    <rect x="20" y="20" width="120" height="120" rx="12" fill="#FAF7F2" stroke="#1E3A5F" stroke-width="2"/>
    <!-- Water drops -->
    <path d="M60 50 Q60 35 70 50 Q80 65 60 65 Q40 65 60 50Z" fill="#00B4D8" opacity="0.3"/>
    <path d="M85 60 Q85 50 92 60 Q99 70 85 70 Q71 70 85 60Z" fill="#00B4D8" opacity="0.25"/>
    <!-- Pipe -->
    <rect x="35" y="85" width="90" height="12" rx="6" fill="#8B7355" opacity="0.4"/>
    <rect x="55" y="80" width="8" height="22" rx="2" fill="#8B7355" opacity="0.3"/>
    <rect x="95" y="80" width="8" height="22" rx="2" fill="#8B7355" opacity="0.3"/>
    <!-- Arrow -->
    <path d="M70 110 L70 125 L85 118Z" fill="#4A6741" opacity="0.5"/>
    <text x="80" y="215" text-anchor="middle" font-size="13" fill="#1E3A5F" font-weight="bold" font-family="Arial, Helvetica, sans-serif">Xử lý nước</text>
    <text x="80" y="232" text-anchor="middle" font-size="13" fill="#1E3A5F" font-weight="bold" font-family="Arial, Helvetica, sans-serif">thải &amp; khí thải</text>
  </g>

  <path d="M800 110 L825 110" stroke="#C47D5A" stroke-width="2" stroke-dasharray="4,4" opacity="0.5"/>

  <!-- Service 5: CTNH -->
  <g transform="translate(830, 30)">
    <rect width="160" height="160" rx="16" fill="#8B7355" opacity="0.08"/>
    <rect x="20" y="20" width="120" height="120" rx="12" fill="#FAF7F2" stroke="#8B7355" stroke-width="2"/>
    <!-- Hazard symbol -->
    <polygon points="80,40 110,90 50,90" fill="none" stroke="#C47D5A" stroke-width="2.5"/>
    <text x="80" y="80" text-anchor="middle" font-size="20" fill="#C47D5A" font-weight="bold" font-family="Arial, Helvetica, sans-serif">!</text>
    <!-- Container -->
    <rect x="55" y="95" width="50" height="30" rx="4" fill="#8B7355" opacity="0.2"/>
    <text x="80" y="215" text-anchor="middle" font-size="13" fill="#1E3A5F" font-weight="bold" font-family="Arial, Helvetica, sans-serif">Quản lý chất</text>
    <text x="80" y="232" text-anchor="middle" font-size="13" fill="#1E3A5F" font-weight="bold" font-family="Arial, Helvetica, sans-serif">thải nguy hại</text>
  </g>

  <path d="M1000 110 L1025 110" stroke="#C47D5A" stroke-width="2" stroke-dasharray="4,4" opacity="0.5"/>

  <!-- Service 6: KNK -->
  <g transform="translate(1030, 30)">
    <rect width="160" height="160" rx="16" fill="#2D4A6F" opacity="0.08"/>
    <rect x="20" y="20" width="120" height="120" rx="12" fill="#FAF7F2" stroke="#2D4A6F" stroke-width="2"/>
    <!-- Globe -->
    <circle cx="80" cy="75" r="30" fill="none" stroke="#4A6741" stroke-width="2" opacity="0.4"/>
    <ellipse cx="80" cy="75" rx="15" ry="30" fill="none" stroke="#4A6741" stroke-width="1.5" opacity="0.3"/>
    <line x1="50" y1="75" x2="110" y2="75" stroke="#4A6741" stroke-width="1" opacity="0.3"/>
    <line x1="55" y1="60" x2="105" y2="60" stroke="#4A6741" stroke-width="1" opacity="0.2"/>
    <line x1="55" y1="90" x2="105" y2="90" stroke="#4A6741" stroke-width="1" opacity="0.2"/>
    <!-- CO2 -->
    <text x="80" y="45" text-anchor="middle" font-size="11" fill="#C47D5A" font-weight="bold" font-family="Arial, Helvetica, sans-serif">CO₂</text>
    <text x="80" y="215" text-anchor="middle" font-size="13" fill="#1E3A5F" font-weight="bold" font-family="Arial, Helvetica, sans-serif">Kiểm kê khí</text>
    <text x="80" y="232" text-anchor="middle" font-size="13" fill="#1E3A5F" font-weight="bold" font-family="Arial, Helvetica, sans-serif">nhà kính</text>
  </g>

  <!-- Bottom decorative line -->
  <line x1="30" y1="280" x2="1170" y2="280" stroke="#C47D5A" stroke-width="1" opacity="0.2"/>

  <!-- Bottom text -->
  <text x="600" y="320" text-anchor="middle" font-size="16" fill="#1E3A5F" font-family="Arial, sans-serif" font-weight="bold">Giải pháp tư vấn môi trường toàn diện</text>
  <text x="600" y="345" text-anchor="middle" font-size="12" fill="#8B7355" font-family="Arial, Helvetica, sans-serif">Đồng hành cùng doanh nghiệp tuân thủ pháp luật và phát triển bền vững</text>

  <!-- Leaf decorations -->
  <path d="M30 350 Q45 330 60 340 Q45 345 40 355Z" fill="#4A6741" opacity="0.15"/>
  <path d="M1140 350 Q1155 330 1170 340 Q1155 345 1150 355Z" fill="#4A6741" opacity="0.15"/>
</svg>