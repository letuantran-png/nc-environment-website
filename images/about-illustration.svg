<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#2D4A6F"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="400" rx="12" fill="url(#bg1)"/>

  <!-- Decorative circles -->
  <circle cx="400" cy="80" r="120" fill="#4A6741" opacity="0.08"/>
  <circle cx="100" cy="350" r="100" fill="#00B4D8" opacity="0.06"/>

  <!-- Team illustration - 3 people silhouettes -->
  <g transform="translate(150, 120)">
    <!-- Person 1 (center, taller - leader) -->
    <circle cx="100" cy="60" r="28" fill="#C47D5A" opacity="0.8"/>
    <rect x="75" y="95" width="50" height="80" rx="12" fill="#C47D5A" opacity="0.6"/>
    <!-- Tie -->
    <path d="M97 95 L100 130 L103 95" fill="#D4A574" opacity="0.8"/>

    <!-- Person 2 (left) -->
    <circle cx="20" cy="75" r="24" fill="#9B8E7E" opacity="0.7"/>
    <rect x="0" y="105" width="40" height="70" rx="10" fill="#9B8E7E" opacity="0.5"/>

    <!-- Person 3 (right) -->
    <circle cx="180" cy="75" r="24" fill="#8B7355" opacity="0.7"/>
    <rect x="160" y="105" width="40" height="70" rx="10" fill="#8B7355" opacity="0.5"/>
  </g>

  <!-- Clipboard/Document -->
  <g transform="translate(60, 160)">
    <rect x="0" y="0" width="55" height="70" rx="6" fill="white" opacity="0.15"/>
    <rect x="15" y="-8" width="25" height="12" rx="4" fill="white" opacity="0.2"/>
    <rect x="10" y="15" width="35" height="3" rx="1" fill="white" opacity="0.2"/>
    <rect x="10" y="23" width="30" height="3" rx="1" fill="white" opacity="0.15"/>
    <rect x="10" y="31" width="35" height="3" rx="1" fill="white" opacity="0.2"/>
    <rect x="10" y="39" width="25" height="3" rx="1" fill="white" opacity="0.15"/>
    <path d="M15 52 L22 58 L38 42" fill="none" stroke="#4A6741" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- Leaf/Nature symbol -->
  <g transform="translate(370, 180)">
    <path d="M0 50 Q25 -10 60 0 Q50 35 10 55Z" fill="#4A6741" opacity="0.5"/>
    <path d="M5 50 Q30 25 55 8" fill="none" stroke="#2ECC40" stroke-width="1.5" opacity="0.4"/>
    <path d="M30 60 Q20 20 50 -5 Q35 30 15 55Z" fill="#2ECC40" opacity="0.3"/>
  </g>

  <!-- Stats badges -->
  <!-- Badge 1 -->
  <g transform="translate(60, 290)">
    <rect width="110" height="55" rx="10" fill="white" opacity="0.1"/>
    <text x="20" y="28" fill="#C47D5A" font-family="Georgia,serif" font-size="22" font-weight="bold">5+</text>
    <text x="20" y="44" fill="white" font-family="Calibri,sans-serif" font-size="11" opacity="0.7">Chuyên gia</text>
  </g>
  <!-- Badge 2 -->
  <g transform="translate(195, 290)">
    <rect width="110" height="55" rx="10" fill="white" opacity="0.1"/>
    <text x="15" y="28" fill="#C47D5A" font-family="Georgia,serif" font-size="22" font-weight="bold">100%</text>
    <text x="15" y="44" fill="white" font-family="Calibri,sans-serif" font-size="11" opacity="0.7">Cam kết CL</text>
  </g>
  <!-- Badge 3 -->
  <g transform="translate(330, 290)">
    <rect width="110" height="55" rx="10" fill="white" opacity="0.1"/>
    <text x="15" y="28" fill="#C47D5A" font-family="Georgia,serif" font-size="22" font-weight="bold">2026</text>
    <text x="15" y="44" fill="white" font-family="Calibri,sans-serif" font-size="11" opacity="0.7">Thành lập</text>
  </g>

  <!-- Decorative dots -->
  <circle cx="430" cy="50" r="4" fill="#C47D5A" opacity="0.4"/>
  <circle cx="450" cy="120" r="3" fill="#D4A574" opacity="0.3"/>
  <circle cx="70" cy="100" r="3" fill="#00B4D8" opacity="0.3"/>
  <circle cx="40" cy="140" r="2" fill="#4A6741" opacity="0.4"/>
</svg>
