<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="ndBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4A6741"/>
      <stop offset="100%" stop-color="#3a5735"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#ndBg)" rx="12"/>

  <!-- Magnifying glass searching environment -->
  <g transform="translate(180, 60)">
    <!-- Landscape inside circle -->
    <circle cx="120" cy="120" r="100" fill="#FAF7F2" opacity="0.15"/>
    <circle cx="120" cy="120" r="85" fill="#FAF7F2" opacity="0.9"/>

    <!-- Mini landscape inside -->
    <path d="M55 160 Q80 120 105 140 Q130 110 155 130 Q175 120 185 135 L185 175 Q185 185 175 185 L65 185 Q55 185 55 175Z" fill="#4A6741" opacity="0.2"/>
    <rect x="80" y="85" width="25" height="55" rx="3" fill="#1E3A5F" opacity="0.3"/>
    <rect x="85" y="95" width="15" height="10" rx="1" fill="#FAF7F2" opacity="0.5"/>
    <rect x="85" y="110" width="15" height="10" rx="1" fill="#FAF7F2" opacity="0.5"/>
    <!-- Tree -->
    <rect x="138" y="120" width="6" height="20" rx="1" fill="#8B7355" opacity="0.5"/>
    <ellipse cx="141" cy="110" rx="15" ry="18" fill="#4A6741" opacity="0.4"/>
    <!-- Water -->
    <path d="M55 165 Q90 155 120 165 Q150 175 185 160" fill="none" stroke="#00B4D8" stroke-width="2" opacity="0.3"/>

    <!-- Handle -->
    <line x1="195" y1="195" x2="240" y2="240" stroke="#8B7355" stroke-width="12" stroke-linecap="round" opacity="0.7"/>
    <line x1="195" y1="195" x2="240" y2="240" stroke="#C47D5A" stroke-width="8" stroke-linecap="round" opacity="0.5"/>

    <!-- Circle border -->
    <circle cx="120" cy="120" r="85" fill="none" stroke="#1E3A5F" stroke-width="4" opacity="0.6"/>
  </g>

  <!-- Clipboard -->
  <g transform="translate(400, 100)">
    <rect x="0" y="10" width="100" height="130" rx="6" fill="#FAF7F2" opacity="0.9"/>
    <rect x="-5" y="5" width="30" height="15" rx="4" fill="#C47D5A" opacity="0.6"/>
    <rect x="10" y="30" width="80" height="6" rx="2" fill="#1E3A5F" opacity="0.15"/>
    <rect x="10" y="42" width="60" height="4" rx="2" fill="#1E3A5F" opacity="0.1"/>
    <rect x="10" y="52" width="70" height="4" rx="2" fill="#1E3A5F" opacity="0.1"/>
    <!-- Checkboxes -->
    <rect x="10" y="68" width="10" height="10" rx="2" fill="none" stroke="#4A6741" stroke-width="1.5"/>
    <path d="M12 73 L14 75 L18 71" stroke="#4A6741" stroke-width="1.5" fill="none"/>
    <rect x="25" y="70" width="50" height="4" rx="2" fill="#1E3A5F" opacity="0.1"/>

    <rect x="10" y="85" width="10" height="10" rx="2" fill="none" stroke="#4A6741" stroke-width="1.5"/>
    <path d="M12 90 L14 92 L18 88" stroke="#4A6741" stroke-width="1.5" fill="none"/>
    <rect x="25" y="87" width="55" height="4" rx="2" fill="#1E3A5F" opacity="0.1"/>

    <rect x="10" y="102" width="10" height="10" rx="2" fill="none" stroke="#C47D5A" stroke-width="1.5"/>
    <rect x="25" y="104" width="45" height="4" rx="2" fill="#1E3A5F" opacity="0.1"/>
  </g>

  <!-- Bottom label -->
  <text x="300" y="345" text-anchor="middle" font-size="18" fill="#FAF7F2" font-weight="bold" font-family="Arial, sans-serif">Đánh giá Tác động Môi trường</text>
  <text x="300" y="372" text-anchor="middle" font-size="12" fill="#FAF7F2" opacity="0.6" font-family="Arial, Helvetica, sans-serif">Quy trình lập báo cáo ĐTM cho doanh nghiệp</text>
</svg>