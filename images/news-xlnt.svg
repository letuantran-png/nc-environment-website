<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="nxBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4A6741"/>
      <stop offset="100%" stop-color="#2D4A6F"/>
    </linearGradient>
    <linearGradient id="waterF" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00B4D8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00B4D8" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#nxBg)" rx="12"/>
  <!-- Tank 1 - Input -->
  <g transform="translate(60, 80)">
    <rect width="120" height="160" rx="10" fill="#FAF7F2" opacity="0.15"/>
    <rect x="5" y="5" width="110" height="150" rx="8" fill="#FAF7F2" opacity="0.1"/>
    <!-- Dirty water -->
    <rect x="10" y="60" width="100" height="90" rx="6" fill="#8B7355" opacity="0.4"/>
    <text x="60" y="115" text-anchor="middle" font-size="11" fill="#FAF7F2" font-family="Arial, Helvetica, sans-serif">Nước thải</text>
    <text x="60" y="25" text-anchor="middle" font-size="10" fill="#FAF7F2" opacity="0.7" font-family="Arial, Helvetica, sans-serif">Bể tiếp nhận</text>
  </g>
  <!-- Pipe 1 -->
  <rect x="185" y="155" width="40" height="10" rx="5" fill="#8B7355" opacity="0.5"/>
  <path d="M215 155 L225 160 L215 165" fill="#C47D5A"/>
  <!-- Tank 2 - Biological -->
  <g transform="translate(230, 60)">
    <rect width="130" height="180" rx="10" fill="#FAF7F2" opacity="0.15"/>
    <rect x="5" y="5" width="120" height="170" rx="8" fill="#FAF7F2" opacity="0.1"/>
    <!-- Bio process -->
    <rect x="10" y="70" width="110" height="100" rx="6" fill="#4A6741" opacity="0.3"/>
    <!-- Bubbles -->
    <circle cx="40" cy="110" r="5" fill="#FAF7F2" opacity="0.2"/>
    <circle cx="60" cy="95" r="4" fill="#FAF7F2" opacity="0.15"/>
    <circle cx="80" cy="120" r="6" fill="#FAF7F2" opacity="0.2"/>
    <circle cx="100" cy="100" r="3" fill="#FAF7F2" opacity="0.15"/>
    <circle cx="50" cy="130" r="4" fill="#FAF7F2" opacity="0.18"/>
    <circle cx="90" cy="140" r="5" fill="#FAF7F2" opacity="0.15"/>
    <text x="65" y="25" text-anchor="middle" font-size="10" fill="#FAF7F2" opacity="0.7" font-family="Arial, Helvetica, sans-serif">Xử lý sinh học</text>
    <text x="65" y="45" text-anchor="middle" font-size="9" fill="#FAF7F2" opacity="0.5" font-family="Arial, Helvetica, sans-serif">Aerotank</text>
  </g>
  <!-- Pipe 2 -->
  <rect x="365" y="155" width="40" height="10" rx="5" fill="#8B7355" opacity="0.5"/>
  <path d="M395 155 L405 160 L395 165" fill="#4A6741"/>
  <!-- Tank 3 - Clean Output -->
  <g transform="translate(410, 80)">
    <rect width="120" height="160" rx="10" fill="#FAF7F2" opacity="0.15"/>
    <rect x="5" y="5" width="110" height="150" rx="8" fill="#FAF7F2" opacity="0.1"/>
    <!-- Clean water -->
    <rect x="10" y="60" width="100" height="90" rx="6" fill="url(#waterF)"/>
    <text x="60" y="115" text-anchor="middle" font-size="11" fill="#FAF7F2" font-family="Arial, Helvetica, sans-serif">Nước sạch</text>
    <text x="60" y="25" text-anchor="middle" font-size="10" fill="#FAF7F2" opacity="0.7" font-family="Arial, Helvetica, sans-serif">Bể lắng</text>
    <!-- Checkmark -->
    <circle cx="90" cy="60" r="14" fill="#4A6741" opacity="0.7"/>
    <path d="M84 60 L88 64 L96 56" stroke="#FAF7F2" stroke-width="2.5" fill="none"/>
  </g>
  <!-- QCVN badge -->
  <g transform="translate(430, 260)">
    <rect width="110" height="30" rx="15" fill="#C47D5A" opacity="0.4"/>
    <text x="55" y="20" text-anchor="middle" font-size="10" fill="#FAF7F2" font-family="Arial, Helvetica, sans-serif">QCVN 40:2011</text>
  </g>
  <text x="300" y="335" text-anchor="middle" font-size="18" fill="#FAF7F2" font-weight="bold" font-family="Arial, sans-serif">Xử lý Nước thải Công nghiệp</text>
  <text x="300" y="360" text-anchor="middle" font-size="12" fill="#FAF7F2" opacity="0.6" font-family="Arial, Helvetica, sans-serif">Hướng dẫn vận hành hiệu quả, đạt chuẩn</text>
</svg>