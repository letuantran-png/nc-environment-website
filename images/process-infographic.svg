<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 220">
  <defs>
    <linearGradient id="pcopper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C47D5A"/>
      <stop offset="100%" stop-color="#D4A574"/>
    </linearGradient>
    <linearGradient id="proyal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#2D4A6F"/>
    </linearGradient>
  </defs>

  <!-- Connecting line -->
  <line x1="165" y1="90" x2="935" y2="90" stroke="#F0EBE3" stroke-width="3" stroke-dasharray="10 6"/>

  <!-- Step 1: Tiếp nhận -->
  <g transform="translate(55, 10)">
    <circle cx="110" cy="80" r="55" fill="#FAF7F2" stroke="#C47D5A" stroke-width="2.5"/>
    <circle cx="110" cy="80" r="45" fill="url(#pcopper)" opacity="0.15"/>
    <!-- Headphone icon -->
    <path d="M95 72 C95 60 125 60 125 72" fill="none" stroke="#1E3A5F" stroke-width="3" stroke-linecap="round"/>
    <rect x="88" y="72" width="10" height="18" rx="4" fill="#C47D5A"/>
    <rect x="122" y="72" width="10" height="18" rx="4" fill="#C47D5A"/>
    <text x="110" y="118" text-anchor="middle" fill="#1E3A5F" font-family="Georgia,serif" font-size="15" font-weight="bold">01</text>
    <text x="110" y="155" text-anchor="middle" fill="#1E3A5F" font-family="Calibri,sans-serif" font-size="13" font-weight="600">Tiếp nhận</text>
    <text x="110" y="172" text-anchor="middle" fill="#9B8E7E" font-family="Calibri,sans-serif" font-size="11">yêu cầu</text>
  </g>
  <!-- Arrow 1 -->
  <polygon points="270,87 282,80 282,83 300,83 300,97 282,97 282,100" fill="#C47D5A" opacity="0.5"/>

  <!-- Step 2: Kế hoạch -->
  <g transform="translate(305, 10)">
    <circle cx="110" cy="80" r="55" fill="#FAF7F2" stroke="#4A6741" stroke-width="2.5"/>
    <circle cx="110" cy="80" r="45" fill="#4A6741" opacity="0.1"/>
    <!-- Clipboard icon -->
    <rect x="96" y="63" width="28" height="35" rx="3" fill="none" stroke="#1E3A5F" stroke-width="2.5"/>
    <rect x="104" y="58" width="12" height="8" rx="3" fill="#4A6741"/>
    <line x1="102" y1="76" x2="118" y2="76" stroke="#4A6741" stroke-width="2" stroke-linecap="round"/>
    <line x1="102" y1="83" x2="115" y2="83" stroke="#4A6741" stroke-width="2" stroke-linecap="round"/>
    <line x1="102" y1="90" x2="118" y2="90" stroke="#4A6741" stroke-width="2" stroke-linecap="round"/>
    <text x="110" y="118" text-anchor="middle" fill="#1E3A5F" font-family="Georgia,serif" font-size="15" font-weight="bold">02</text>
    <text x="110" y="155" text-anchor="middle" fill="#1E3A5F" font-family="Calibri,sans-serif" font-size="13" font-weight="600">Kế hoạch</text>
    <text x="110" y="172" text-anchor="middle" fill="#9B8E7E" font-family="Calibri,sans-serif" font-size="11">& Báo giá</text>
  </g>
  <!-- Arrow 2 -->
  <polygon points="520,87 532,80 532,83 550,83 550,97 532,97 532,100" fill="#4A6741" opacity="0.5"/>

  <!-- Step 3: Triển khai -->
  <g transform="translate(555, 10)">
    <circle cx="110" cy="80" r="55" fill="#FAF7F2" stroke="#00B4D8" stroke-width="2.5"/>
    <circle cx="110" cy="80" r="45" fill="#00B4D8" opacity="0.1"/>
    <!-- Gear icon -->
    <circle cx="110" cy="78" r="14" fill="none" stroke="#1E3A5F" stroke-width="2.5"/>
    <circle cx="110" cy="78" r="5" fill="#00B4D8" opacity="0.6"/>
    <line x1="110" y1="60" x2="110" y2="65" stroke="#1E3A5F" stroke-width="3" stroke-linecap="round"/>
    <line x1="110" y1="91" x2="110" y2="96" stroke="#1E3A5F" stroke-width="3" stroke-linecap="round"/>
    <line x1="127" y1="78" x2="123" y2="78" stroke="#1E3A5F" stroke-width="3" stroke-linecap="round"/>
    <line x1="97" y1="78" x2="93" y2="78" stroke="#1E3A5F" stroke-width="3" stroke-linecap="round"/>
    <line x1="122" y1="66" x2="119" y2="69" stroke="#1E3A5F" stroke-width="3" stroke-linecap="round"/>
    <line x1="101" y1="87" x2="98" y2="90" stroke="#1E3A5F" stroke-width="3" stroke-linecap="round"/>
    <line x1="122" y1="90" x2="119" y2="87" stroke="#1E3A5F" stroke-width="3" stroke-linecap="round"/>
    <line x1="101" y1="69" x2="98" y2="66" stroke="#1E3A5F" stroke-width="3" stroke-linecap="round"/>
    <text x="110" y="118" text-anchor="middle" fill="#1E3A5F" font-family="Georgia,serif" font-size="15" font-weight="bold">03</text>
    <text x="110" y="155" text-anchor="middle" fill="#1E3A5F" font-family="Calibri,sans-serif" font-size="13" font-weight="600">Triển khai</text>
    <text x="110" y="172" text-anchor="middle" fill="#9B8E7E" font-family="Calibri,sans-serif" font-size="11">thực hiện</text>
  </g>
  <!-- Arrow 3 -->
  <polygon points="770,87 782,80 782,83 800,83 800,97 782,97 782,100" fill="#00B4D8" opacity="0.5"/>

  <!-- Step 4: Bàn giao -->
  <g transform="translate(805, 10)">
    <circle cx="110" cy="80" r="55" fill="#FAF7F2" stroke="#1E3A5F" stroke-width="2.5"/>
    <circle cx="110" cy="80" r="45" fill="#1E3A5F" opacity="0.1"/>
    <!-- Checkmark/Handshake -->
    <circle cx="110" cy="76" r="18" fill="#1E3A5F" opacity="0.15"/>
    <path d="M100 76 L107 84 L122 68" fill="none" stroke="#4A6741" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="110" y="118" text-anchor="middle" fill="#1E3A5F" font-family="Georgia,serif" font-size="15" font-weight="bold">04</text>
    <text x="110" y="155" text-anchor="middle" fill="#1E3A5F" font-family="Calibri,sans-serif" font-size="13" font-weight="600">Bàn giao</text>
    <text x="110" y="172" text-anchor="middle" fill="#9B8E7E" font-family="Calibri,sans-serif" font-size="11">& Hỗ trợ</text>
  </g>
</svg>
