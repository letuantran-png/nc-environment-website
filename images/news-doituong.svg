<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="noBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C47D5A"/>
      <stop offset="100%" stop-color="#8B7355"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#noBg)" rx="12"/>
  <!-- Classification boxes -->
  <!-- Group I -->
  <g transform="translate(60, 50)">
    <rect width="150" height="120" rx="10" fill="#FAF7F2" opacity="0.2"/>
    <rect x="5" y="5" width="140" height="30" rx="6" fill="#1E3A5F" opacity="0.6"/>
    <text x="75" y="25" text-anchor="middle" font-size="13" fill="#FAF7F2" font-weight="bold" font-family="Arial, Helvetica, sans-serif">NHÓM I</text>
    <text x="75" y="55" text-anchor="middle" font-size="10" fill="#FAF7F2" font-family="Arial, Helvetica, sans-serif">Nguy cơ cao</text>
    <rect x="15" y="70" width="120" height="4" rx="2" fill="#FAF7F2" opacity="0.2"/>
    <rect x="15" y="80" width="100" height="4" rx="2" fill="#FAF7F2" opacity="0.15"/>
    <rect x="15" y="90" width="110" height="4" rx="2" fill="#FAF7F2" opacity="0.15"/>
    <rect x="15" y="100" width="90" height="4" rx="2" fill="#FAF7F2" opacity="0.15"/>
  </g>
  <!-- Group II -->
  <g transform="translate(230, 50)">
    <rect width="150" height="120" rx="10" fill="#FAF7F2" opacity="0.2"/>
    <rect x="5" y="5" width="140" height="30" rx="6" fill="#4A6741" opacity="0.6"/>
    <text x="75" y="25" text-anchor="middle" font-size="13" fill="#FAF7F2" font-weight="bold" font-family="Arial, Helvetica, sans-serif">NHÓM II</text>
    <text x="75" y="55" text-anchor="middle" font-size="10" fill="#FAF7F2" font-family="Arial, Helvetica, sans-serif">Có nguy cơ</text>
    <rect x="15" y="70" width="120" height="4" rx="2" fill="#FAF7F2" opacity="0.2"/>
    <rect x="15" y="80" width="100" height="4" rx="2" fill="#FAF7F2" opacity="0.15"/>
    <rect x="15" y="90" width="110" height="4" rx="2" fill="#FAF7F2" opacity="0.15"/>
    <rect x="15" y="100" width="90" height="4" rx="2" fill="#FAF7F2" opacity="0.15"/>
  </g>
  <!-- Group III -->
  <g transform="translate(400, 50)">
    <rect width="150" height="120" rx="10" fill="#FAF7F2" opacity="0.2"/>
    <rect x="5" y="5" width="140" height="30" rx="6" fill="#C47D5A" opacity="0.5"/>
    <text x="75" y="25" text-anchor="middle" font-size="13" fill="#FAF7F2" font-weight="bold" font-family="Arial, Helvetica, sans-serif">NHÓM III</text>
    <text x="75" y="55" text-anchor="middle" font-size="10" fill="#FAF7F2" font-family="Arial, Helvetica, sans-serif">Ít nguy cơ</text>
    <rect x="15" y="70" width="120" height="4" rx="2" fill="#FAF7F2" opacity="0.2"/>
    <rect x="15" y="80" width="100" height="4" rx="2" fill="#FAF7F2" opacity="0.15"/>
    <rect x="15" y="90" width="110" height="4" rx="2" fill="#FAF7F2" opacity="0.15"/>
    <rect x="15" y="100" width="90" height="4" rx="2" fill="#FAF7F2" opacity="0.15"/>
  </g>
  <!-- Question mark -->
  <g transform="translate(250, 190)">
    <circle cx="50" cy="50" r="45" fill="#FAF7F2" opacity="0.15"/>
    <text x="50" y="68" text-anchor="middle" font-size="50" fill="#FAF7F2" font-weight="bold" font-family="Arial, sans-serif" opacity="0.4">?</text>
  </g>
  <!-- Factory icons -->
  <g transform="translate(100, 220)" opacity="0.3">
    <rect x="0" y="20" width="30" height="40" rx="3" fill="#FAF7F2"/>
    <rect x="5" y="0" width="8" height="22" rx="2" fill="#FAF7F2"/>
    <rect x="17" y="5" width="8" height="17" rx="2" fill="#FAF7F2"/>
  </g>
  <g transform="translate(430, 220)" opacity="0.3">
    <rect x="0" y="15" width="35" height="45" rx="3" fill="#FAF7F2"/>
    <rect x="5" y="25" width="10" height="8" rx="1" fill="#C47D5A" opacity="0.5"/>
    <rect x="20" y="25" width="10" height="8" rx="1" fill="#C47D5A" opacity="0.5"/>
  </g>
  <text x="300" y="335" text-anchor="middle" font-size="18" fill="#FAF7F2" font-weight="bold" font-family="Arial, sans-serif">Đối tượng cần Giấy phép MT</text>
  <text x="300" y="360" text-anchor="middle" font-size="12" fill="#FAF7F2" opacity="0.6" font-family="Arial, Helvetica, sans-serif">Phân loại theo Nghị định 08/2022/NĐ-CP</text>
</svg>